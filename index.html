<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  /* page customization */
  body { 
    background: #0a0a0a; 
    color: #ff4d6d; 
    font-family: 'Courier New', monospace; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
    overflow: hidden; 
  }
    h1 { 
    font-size: 2.5rem; 
    z-index: 10; 
    text-shadow: 0 0 20px rgba(255, 77, 109, 0.8); 
    pointer-events: none;
    text-align: center;
  }

  .heart { 
    position: absolute; 
    bottom: -50px; 
    user-select: none; 
    z-index: 1;
    animation: mainFly linear infinite;
  }

  @keyframes mainFly {
    0% { 
      transform: translateY(0) rotate(0deg) translateX(0); 
      opacity: 0; 
    }
    10% { opacity: 0.5; }
    25% { transform: translateY(-25vh) rotate(15deg) translateX(20px); } /* плавный крен вправо */
    50% { transform: translateY(-50vh) rotate(0deg) translateX(0); }
    75% { transform: translateY(-75vh) rotate(-15deg) translateX(-20px); } /* крен влево */
    90% { opacity: 0.5; }
    100% { 
      transform: translateY(-115vh) rotate(0deg) translateX(0); 
      opacity: 0; 
    }
  }
</style>

<!-- ur text -->
<h1>i like u <3</h1>

<script>
  // script :D
  const count = 40;
  for (let i = 0; i < count; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.innerHTML = '♥';
    
    const size = Math.random() * 25 + 10;
    h.style.fontSize = size + 'px';
    h.style.left = Math.random() * 100 + 'vw';
    
    // delay
    const duration = Math.random() * 5 + 5; 
    h.style.animationDuration = duration + 's';
    h.style.animationDelay = (Math.random() * -10) + 's';
    
    if (size < 15) h.style.opacity = '0.3';

    document.body.appendChild(h);
  }
</script>
